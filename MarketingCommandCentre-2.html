/* ----------------------------- HELPERS --------------------------------- */

const audFmt = (n, cents = false) =>
  "$" + Number(n || 0).toLocaleString("en-AU", {
    minimumFractionDigits: cents ? 2 : 0, maximumFractionDigits: cents ? 2 : 0,
  });
const nzdFmt = (n, cents = false) =>
  "NZ$" + Number(n || 0).toLocaleString("en-NZ", {
    minimumFractionDigits: cents ? 2 : 0, maximumFractionDigits: cents ? 2 : 0,
  });

const quoteTotals = (q) => {
  const sub = (q?.lineItems || []).reduce(
    (s, li) => s + (Number(li.qty) || 0) * (Number(li.unitPrice) || 0), 0);
  return { sub, gst: sub * 0.1, total: sub * 1.1 };
};
const leadQuote = (lead) => {
  if (!lead.quotes || !lead.quotes.length) return null;
  if (lead.wonQuoteId) return lead.quotes.find((q) => q.id === lead.wonQuoteId) || lead.quotes[lead.quotes.length - 1];
  return lead.quotes[lead.quotes.length - 1];
};
const leadValue = (lead) => { const q = leadQuote(lead); return q ? quoteTotals(q).total : 0; };
const monthKey = (iso) => { const d = new Date(iso); return isNaN(d) ? "—" : d.toLocaleDateString("en-AU", { month: "long", year: "numeric" }); };
const uid = () => Math.random().toString(36).slice(2, 9);
const firstOfNextMonth = () => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth() + 1, 1).toISOString().slice(0, 10); };
const next12 = () => { const n = new Date(); const b = new Date(n.getFullYear(), n.getMonth(), 1); return Array.from({ length: 12 }, (_, i) => new Date(b.getFullYear(), b.getMonth() + i, 1)); };
const sameMonth = (iso, d) => { if (!iso) return false; const x = new Date(iso); return x.getFullYear() === d.getFullYear() && x.getMonth() === d.getMonth(); };
const monthShort = (d) => d.toLocaleDateString("en-AU", { month: "short", year: "numeric" });

const Eyebrow = ({ children, icon: Icon }) => (

const Panel = ({ children, className = "", glow = false }) => (

const SrcChip = ({ source }) => {

  return <span className={`inline-flex items-center rounded-full border px-1.5 py-0.5 text-[10px] font-medium ${s?.chip || "bg-slate-700/40 text-slate-300 border-slate-600/50"}`}>{s?.short || source}</span>;
};
const SectionHeader = ({ icon: Icon, title, desc }) => (
  <div className="mb-5 flex items-start gap-3">

);
function Spark({ data, status = "cyan" }) {
  const w = 60, h = 18, max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => `${((i / (data.length - 1)) * w).toFixed(1)},${(h - ((v - min) / (max - min || 1)) * h).toFixed(1)}`).join(" ");
  return <span className={(STATUS[status] || STATUS.cyan).text}><svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none"><polyline points={pts} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg></span>;
}
function StatTable({ columns, rows, render }) {

}

function StageColumn({ stage, leads, onCard }) {
  const total = leads.reduce((s, l) => s + leadValue(l), 0);
  const showValue = ["quote", "won", "lost"].includes(stage.id);
  const a = STATUS[stage.accent] || STATUS.slate;
  return (
    <div className="flex w-72 shrink-0 flex-col">
      <div className="mb-2 flex items-center justify-between px-1">

        {leads.length === 0 && <p className="px-2 py-6 text-center text-xs text-slate-600">Nothing here</p>}
        {leads.map((l) => <LeadCard key={l.id} lead={l} onClick={() => onCard(l.id)} />)}
      </div>

function LeadsBoard({ leads, onCard, onAdd, openActions, aiDismissed, setAiDismissed, onReset }) {
  const [month, setMonth] = useState("all");
  const monthLabel = (ym) => { const d = new Date(ym + "-01"); return isNaN(d) ? ym : d.toLocaleDateString("en-AU", { month: "short", year: "numeric" }); };
  const monthsPresent = Array.from(new Set(leads.map((l) => (l.date || "").slice(0, 7)).filter(Boolean))).sort().reverse();
  const shown = month === "all" ? leads : leads.filter((l) => (l.date || "").slice(0, 7) === month);
  const trend = monthsPresent.slice().reverse().map((ym) => {
    const ls = leads.filter((l) => (l.date || "").slice(0, 7) === ym);
    return { ym, label: monthLabel(ym), paid: ls.filter((l) => SOURCES[l.source]?.paid).length, organic: ls.filter((l) => SOURCES[l.source] && !SOURCES[l.source].paid).length, total: ls.length };
  });
  const maxTrend = Math.max(1, ...trend.map((t) => t.total));

  return (
    <div>
      <AiBanner onOpen={openActions} dismissed={aiDismissed} setDismissed={setAiDismissed} />
      <div className="mb-4 flex flex-wrap items-center justify-between gap-3">
        <p className="text-sm text-slate-500">Click any card to qualify it, build a quote, or mark it won or lost.</p>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1.5"><CalendarDays className="h-3.5 w-3.5 text-slate-500" />
            <select value={month} onChange={(e) => setMonth(e.target.value)} className="rounded-lg border border-slate-700 bg-slate-950 px-2.5 py-1.5 text-xs text-slate-200 focus:border-cyan-500/50">
              <option value="all">All months</option>
              {monthsPresent.map((ym) => <option key={ym} value={ym}>{monthLabel(ym)}</option>)}
            </select>
          </div>
          <button onClick={onReset} title="Reset to tracker data" className="inline-flex items-center gap-1.5 rounded-lg border border-slate-700 px-2.5 py-1.5 text-xs text-slate-400 transition hover:bg-slate-800"><RotateCcw className="h-3.5 w-3.5" /> Reset</button>
          <button onClick={onAdd} className="inline-flex items-center gap-1.5 rounded-lg bg-cyan-500 px-3 py-1.5 text-sm font-medium text-slate-950 transition hover:bg-cyan-400"><Plus className="h-4 w-4" /> Add lead</button>
        </div>
      </div>

      {trend.length > 0 && (
        <Panel className="mb-4 p-4">
          <div className="flex items-center justify-between">
            <Eyebrow icon={TrendingUp}>Leads per month</Eyebrow>
            <div className="flex items-center gap-3 text-[11px] text-slate-400">
              <span className="inline-flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-amber-400" /> Paid</span>
              <span className="inline-flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-emerald-400" /> Organic</span>
            </div>
          </div>
          <div className="mt-3 flex items-end gap-3 overflow-x-auto">
            {trend.map((t) => (
              <button key={t.ym} onClick={() => setMonth(month === t.ym ? "all" : t.ym)} className="flex shrink-0 flex-col items-center gap-1" style={{ width: 44 }} title={`${t.label}: ${t.paid} paid · ${t.organic} organic`}>
                <span className="font-data text-[11px] tabular-nums text-slate-300">{t.total}</span>
                <span className="flex h-24 w-full flex-col justify-end overflow-hidden rounded-md border border-slate-800 bg-slate-950">
                  <span className="w-full bg-emerald-400/80" style={{ height: `${(t.organic / maxTrend) * 100}%` }} />
                  <span className="w-full bg-amber-400/80" style={{ height: `${(t.paid / maxTrend) * 100}%` }} />
                </span>
                <span className={`text-[10px] ${month === t.ym ? "text-cyan-300" : "text-slate-500"}`}>{t.label}</span>
              </button>
            ))}
          </div>
        </Panel>
      )}

      <div className="flex gap-3 overflow-x-auto pb-4">
        {STAGES.map((s) => <StageColumn key={s.id} stage={s} leads={shown.filter((l) => l.stage === s.id)} onCard={onCard} />)}
      </div>
    </div>
  );
}

function SettingNum({ label, value, onChange, prefix, suffix, step }) {
  return (
    <div>
      <p className="text-[11px] uppercase tracking-wider text-slate-500 font-display">{label}</p>

        {prefix && <span className="pl-2.5 text-sm text-slate-500">{prefix}</span>}
        <input type="number" step={step || "1"} min="0" value={value} onChange={(e) => onChange(e.target.value === "" ? 0 : Number(e.target.value))}
          className="w-full bg-transparent px-2.5 py-2 font-data text-sm text-slate-200 focus:outline-none" />
        {suffix && <span className="pr-2.5 text-xs text-slate-500">{suffix}</span>}
      </div>
    </div>
  );
}

function PipelineView({ leads, settings, setSettings, onCard, onSchedule }) {
  const [showSettings, setShowSettings] = useState(false);
  const set = (k, v) => setSettings((s) => ({ ...s, [k]: v }));
  const jobs = leads.filter((l) => l.stage === "won");
  const months = next12();
  const { jobsTarget, revenueTarget, leadTimeWeeks, costPerLead, leadToWonRate } = settings;
  const leadTimeMonths = leadTimeWeeks / 4.345;
  const hasMoney = costPerLead > 0 && leadToWonRate > 0;
  const costPerWon = hasMoney ? costPerLead / (leadToWonRate / 100) : 0;
  const bandMeta = { slow: { c: "amber", label: "Slow" }, filling: { c: "cyan", label: "Filling" }, booked: { c: "emerald", label: "Booked out" } };

  const rows = months.map((m, i) => {
    const inMonth = jobs.filter((j) => sameMonth(j.startDate, m));
    const count = inMonth.length;
    const value = inMonth.reduce((s, j) => s + leadValue(j), 0);
    const ratio = jobsTarget > 0 ? count / jobsTarget : 0;
    const band = ratio >= 1 ? "booked" : ratio >= 0.5 ? "filling" : "slow";
    return { m, i, inMonth, count, value, ratio, band, short: Math.max(0, jobsTarget - count), fillable: i >= leadTimeMonths };
  });
  const fillableSlow = rows.filter((r) => r.band !== "booked" && r.fillable && r.short > 0);
  const tooSoonSlow = rows.filter((r) => r.band !== "booked" && !r.fillable && r.short > 0);
  const soonest = fillableSlow[0];
  const totalJobs = rows.reduce((s, r) => s + r.count, 0);
  const totalValue = rows.reduce((s, r) => s + r.value, 0);

  const rec = (r) => {
    const pct = Math.round(r.ratio * 100);
    if (r.band === "booked") return { tone: "emerald", verb: "Hold / redirect", text: `Booked out (${pct}% of target). No extra spend needed — redirect budget to slower months.` };
    if (!r.fillable) return { tone: "slate", verb: "Too soon", text: `${pct}% booked, but it’s inside your ~${leadTimeWeeks}-week ad lead time. Too close to fill with new ads — focus spend on the months after.` };
    const dollar = hasMoney && r.short > 0 ? ` ~${r.short} job${r.short > 1 ? "s" : ""} short — at ≈${audFmt(costPerWon)} per won job, about ${audFmt(r.short * costPerWon)} in extra ad spend, committed now.` : "";
    return { tone: r.band === "slow" ? "amber" : "cyan", verb: r.band === "slow" ? "Increase" : "Top up", text: `${pct}% booked.${dollar || " Increase ad spend now to fill it."}` };
  };

  return (
    <div className="space-y-8">
      <SectionHeader icon={CalendarRange} title="Pipeline" desc="Your jobs booked ahead, month by month — and what to spend on ads to fill the gaps." />

      <Panel glow className="bg-cyan-500/5 p-5">
        <div className="flex flex-wrap items-start justify-between gap-4">
          <div className="min-w-0">
            <Eyebrow icon={Zap}>Forward look · next 12 months</Eyebrow>
            <p className="mt-2 max-w-2xl text-sm leading-relaxed text-slate-300">
              {soonest
                ? <>Soonest slow month you can still fill with ads: <span className="font-semibold text-cyan-300">{monthShort(soonest.m)}</span> (~{Math.round(soonest.ratio * 100)}% booked{hasMoney && soonest.short > 0 ? <>, ~{soonest.short} job{soonest.short > 1 ? "s" : ""} short ≈ {audFmt(soonest.short * costPerWon)} extra ad spend</> : ""}).{fillableSlow.length > 1 ? ` ${fillableSlow.length} fillable slow months ahead — each is broken out below.` : ""}</>
                : <>Every fillable month is at or above your target of {jobsTarget} job{jobsTarget !== 1 ? "s" : ""}/mo. Hold spend and redirect to the furthest months.</>}
              {tooSoonSlow.length > 0 && <> The next {tooSoonSlow.length} slow month{tooSoonSlow.length > 1 ? "s are" : " is"} inside your ~{leadTimeWeeks}-week lead time — too close to fill, so push spend to the months after.</>}
            </p>
            <p className="mt-2 text-[11px] leading-relaxed text-slate-500">{totalJobs} job{totalJobs !== 1 ? "s" : ""} · {audFmt(totalValue)} scheduled across the window. {hasMoney ? <>Cost-per-won-job ≈ {audFmt(costPerWon)} (rough — built from cost/lead ÷ {leadToWonRate}% lead→won; limited conversion data).</> : "Add cost/lead and a lead→won rate in settings for dollar estimates."} Spend shown in AUD; note Meta currently bills in NZD.</p>
          </div>
          <button onClick={() => setShowSettings((v) => !v)} className="inline-flex shrink-0 items-center gap-1.5 rounded-lg border border-slate-700 px-3 py-1.5 text-xs text-slate-300 transition hover:bg-slate-800"><Settings className="h-3.5 w-3.5" /> Capacity &amp; ad settings</button>
        </div>
        {showSettings && (
          <div className="mt-4 grid grid-cols-2 gap-3 border-t border-slate-800 pt-4 sm:grid-cols-3 lg:grid-cols-5">
            <SettingNum label="Jobs / month" value={jobsTarget} onChange={(v) => set("jobsTarget", v)} />
            <SettingNum label="Revenue target /mo" value={revenueTarget} onChange={(v) => set("revenueTarget", v)} prefix="$" />
            <SettingNum label="Ad lead time" value={leadTimeWeeks} onChange={(v) => set("leadTimeWeeks", v)} suffix="wks" />
            <SettingNum label="Cost / lead" value={costPerLead} onChange={(v) => set("costPerLead", v)} prefix="$" />
            <SettingNum label="Lead → won" value={leadToWonRate} onChange={(v) => set("leadToWonRate", v)} suffix="%" step="0.5" />
          </div>
        )}
      </Panel>

      <div>
        <Eyebrow icon={CalendarDays}>Booked ahead</Eyebrow>
        <div className="mt-3 space-y-2">
          {rows.map((r) => {
            const bm = bandMeta[r.band]; const rc = rec(r); const revMet = revenueTarget > 0 && r.value >= revenueTarget;
            return (
              <Panel key={r.i} className="p-4">
                <div className="flex flex-wrap items-center gap-x-4 gap-y-3">
                  <div className="w-24 shrink-0">
                    <p className="font-display text-sm font-semibold text-slate-100">{monthShort(r.m)}</p>
                    <p className="font-data text-[11px] text-slate-500">{r.count}/{jobsTarget} job{jobsTarget !== 1 ? "s" : ""}</p>
                  </div>
                  <div className="min-w-[140px] flex-1">
                    <div className="h-2.5 overflow-hidden rounded-full bg-slate-800"><div className={`h-2.5 rounded-full ${STATUS[bm.c].dot}`} style={{ width: `${Math.min(100, r.ratio * 100)}%` }} /></div>
                    <div className="mt-1 flex items-center justify-between">
                      <span className="font-data text-[11px] tabular-nums text-slate-400">{audFmt(r.value)}{revenueTarget > 0 && <span className="text-slate-600"> / {audFmt(revenueTarget)}{revMet ? " ✓" : ""}</span>}</span>
                      <Chip status={bm.c}>{bm.label}</Chip>
                    </div>
                  </div>
                  <div className="flex w-full items-start gap-2 border-t border-slate-800/70 pt-3 sm:w-auto sm:flex-1 sm:border-0 sm:pt-0">
                    {rc.verb === "Increase" ? <TrendingUp className="mt-0.5 h-4 w-4 shrink-0 text-amber-400" /> : rc.verb === "Hold / redirect" ? <TrendingDown className="mt-0.5 h-4 w-4 shrink-0 text-emerald-400" /> : rc.verb === "Too soon" ? <Clock className="mt-0.5 h-4 w-4 shrink-0 text-slate-500" /> : <ArrowUpRight className="mt-0.5 h-4 w-4 shrink-0 text-cyan-400" />}
                    <div><span className={`font-display text-xs font-semibold ${STATUS[rc.tone].text}`}>{rc.verb}</span><p className="text-xs leading-relaxed text-slate-400">{rc.text}</p></div>
                  </div>
                </div>
                {r.inMonth.length > 0 && (
                  <div className="mt-3 flex flex-wrap gap-1.5 border-t border-slate-800/70 pt-3">
                    {r.inMonth.map((j) => (
                      <button key={j.id} onClick={() => onCard(j.id)} className="inline-flex items-center gap-1.5 rounded-lg border border-slate-800 bg-slate-950/40 px-2.5 py-1 text-xs text-slate-300 transition hover:border-cyan-500/40"><Hammer className="h-3 w-3 text-slate-500" />{j.name} · {audFmt(leadValue(j))}</button>
                    ))}
                  </div>
                )}
              </Panel>
            );
          })}
        </div>
      </div>

      <div>
        <Eyebrow icon={Hammer}>Jobs — set a start month &amp; status</Eyebrow>
        <p className="mt-1 text-xs text-slate-500">Won quotes become jobs here. Edit a job’s start date, duration and status inline, or click its name to open the full card.</p>
        <div className="mt-3">
          {jobs.length === 0 ? (
            <Panel className="p-6 text-center text-sm text-slate-500">No won jobs yet — mark a quote won on the Leads board and it’ll appear here.</Panel>
          ) : (
            <StatTable columns={["Job", "Value", "Suburb", "Scheduled start", "Weeks", "Status"]} rows={jobs}
              render={(j) => (
                <tr key={j.id} className="text-slate-300">
                  <td className="px-4 py-3"><button onClick={() => onCard(j.id)} className="font-medium text-slate-100 underline-offset-2 hover:text-cyan-300 hover:underline">{j.name}</button></td>
                  <td className="px-4 py-3 text-right font-data tabular-nums text-emerald-300">{audFmt(leadValue(j))}</td>
                  <td className="px-4 py-3 text-right text-slate-400">{j.suburb}</td>
                  <td className="px-4 py-3 text-right"><input type="date" value={j.startDate || ""} onChange={(e) => onSchedule(j.id, { startDate: e.target.value })} className="rounded-md border border-slate-700 bg-slate-950 px-2 py-1 font-data text-xs text-slate-200 focus:border-cyan-500/50" /></td>
                  <td className="px-4 py-3 text-right"><input type="number" min="1" value={j.durationWeeks || ""} onChange={(e) => onSchedule(j.id, { durationWeeks: Number(e.target.value) })} className="w-14 rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-right font-data text-xs text-slate-200 focus:border-cyan-500/50" /></td>
                  <td className="px-4 py-3 text-right"><select value={j.jobStatus || "scheduled"} onChange={(e) => onSchedule(j.id, { jobStatus: e.target.value })} className="rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs text-slate-200 focus:border-cyan-500/50">{JOB_STATUSES.map((s) => <option key={s.id} value={s.id}>{s.label}</option>)}</select></td>
                </tr>
              )} />
          )}
        </div>
      </div>
    </div>
  );
}

function PaidVsOrganicView({ leads, metrics, setMetrics }) {
  const setSpend = (k, v) => setMetrics((m) => ({ ...m, spend: { ...m.spend, [k]: v } }));

function downscaleImage(file, maxDim = 1024, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (Math.max(width, height) > maxDim) { const r = maxDim / Math.max(width, height); width = Math.round(width * r); height = Math.round(height * r); }
        const c = document.createElement("canvas"); c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        try { resolve(c.toDataURL("image/jpeg", quality)); } catch (e) { reject(e); }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* --- Calendar view --- */
function PostChip({ post, onClick }) {
  const c = post.channels[0] || "instagram";
  return <button onClick={onClick} className={`flex w-full items-center gap-1 truncate rounded px-1.5 py-0.5 text-left text-[10px] ${SOURCES[c]?.chip || "bg-slate-700/40 text-slate-300 border-slate-600/50"} border`}><span className={`h-1.5 w-1.5 shrink-0 rounded-full ${STATUS[POST_STATUS[post.status].c].dot}`} /><span className="truncate">{post.caption || "Untitled"}</span></button>;
}
function CalendarView({ posts, setPosts, leads }) {
  const [tab, setTab] = useState("calendar");
  const [cursor, setCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [editing, setEditing] = useState(null);
  const [aiOpen, setAiOpen] = useState(false);
  const [ideasOpen, setIdeasOpen] = useState(false);
  const savePost = (np) => setPosts((prev) => prev.some((x) => x.id === np.id) ? prev.map((x) => x.id === np.id ? np : x) : [...prev, np]);
  const delPost = (id) => { setPosts((prev) => prev.filter((p) => p.id !== id)); setEditing(null); };
  const newPost = (date) => setEditing({ id: uid(), photo: null, caption: "", hashtags: "", channels: ["instagram"], scheduledAt: (date || new Date().toISOString().slice(0, 10)) + "T18:00", status: "draft", reach: null, engagement: null, why: "" });
  const useIdea = (idea) => { setIdeasOpen(false); setEditing({ id: uid(), photo: null, caption: idea.title || "", hashtags: "", channels: ["instagram"], scheduledAt: defaultSchedule(), status: "draft", reach: null, engagement: null, why: "" }); };

  const y = cursor.getFullYear(), m = cursor.getMonth();
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7;
  const daysIn = new Date(y, m + 1, 0).getDate();
  const cells = []; for (let i = 0; i < startDow; i++) cells.push(null); for (let d = 1; d <= daysIn; d++) cells.push(d);
  const dayISO = (d) => `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
  const postsByDay = (d) => posts.filter((p) => (p.scheduledAt || "").slice(0, 10) === dayISO(d));
  const todayISO = new Date().toISOString().slice(0, 10);
  const nowMin = new Date().toISOString().slice(0, 16);
  const upcoming = posts.filter((p) => p.status === "scheduled" && (p.scheduledAt || "") >= nowMin).sort((a, b) => (a.scheduledAt || "").localeCompare(b.scheduledAt || "")).slice(0, 4);
  const sortedList = posts.slice().sort((a, b) => (b.scheduledAt || "").localeCompare(a.scheduledAt || ""));

  return (
    <div className="space-y-6">
      <SectionHeader icon={CalendarDays} title="Content Calendar" desc="Plan, draft and schedule your organic posts. Publish manually for now and mark them posted." />

      <div className="flex flex-wrap items-center justify-between gap-3">
        <div className="flex items-center gap-1 rounded-lg border border-slate-700 p-0.5">
          <button onClick={() => setTab("calendar")} className={`inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-xs font-medium transition ${tab === "calendar" ? "bg-cyan-500 text-slate-950" : "text-slate-400"}`}><CalendarDays className="h-3.5 w-3.5" /> Calendar</button>
          <button onClick={() => setTab("list")} className={`inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-xs font-medium transition ${tab === "list" ? "bg-cyan-500 text-slate-950" : "text-slate-400"}`}><List className="h-3.5 w-3.5" /> List</button>
        </div>
        <div className="flex flex-wrap items-center gap-2">
          <button onClick={() => setIdeasOpen(true)} className="inline-flex items-center gap-1.5 rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300 transition hover:bg-slate-800"><Sparkles className="h-4 w-4 text-cyan-400" /> Idea starters</button>
          <button onClick={() => setAiOpen(true)} className="inline-flex items-center gap-1.5 rounded-lg border border-cyan-500/40 bg-cyan-500/10 px-3 py-1.5 text-sm text-cyan-200 transition hover:bg-cyan-500/20"><Wand2 className="h-4 w-4" /> Create with AI</button>
          <button onClick={() => newPost(todayISO)} className="inline-flex items-center gap-1.5 rounded-lg bg-cyan-500 px-3 py-1.5 text-sm font-medium text-slate-950 transition hover:bg-cyan-400"><Plus className="h-4 w-4" /> New post</button>
        </div>
      </div>

      {upcoming.length > 0 && (
        <Panel className="p-4">
          <Eyebrow icon={Clock}>Upcoming scheduled</Eyebrow>
          <div className="mt-3 grid gap-2 sm:grid-cols-2 lg:grid-cols-4">
            {upcoming.map((p) => (
              <button key={p.id} onClick={() => setEditing(p)} className="rounded-xl border border-slate-800 bg-slate-950/40 p-3 text-left transition hover:border-cyan-500/40">
                <div className="flex items-center gap-1.5">{p.channels.map((c) => <SrcChip key={c} source={c} />)}</div>
                <p className="mt-1.5 line-clamp-2 text-xs text-slate-300">{p.caption || "Untitled"}</p>
                <p className="mt-1 font-data text-[11px] text-cyan-300">{fmtWhen(p.scheduledAt)}</p>
              </button>
            ))}
          </div>
        </Panel>
      )}

      {tab === "calendar" ? (
        <Panel className="p-4">
          <div className="mb-3 flex items-center justify-between">
            <h3 className="font-display text-base font-semibold text-slate-100">{cursor.toLocaleDateString("en-AU", { month: "long", year: "numeric" })}</h3>
            <div className="flex items-center gap-1">
              <button onClick={() => setCursor(new Date(y, m - 1, 1))} className="rounded-md border border-slate-700 p-1.5 text-slate-400 transition hover:bg-slate-800"><ChevronLeft className="h-4 w-4" /></button>
              <button onClick={() => { const d = new Date(); setCursor(new Date(d.getFullYear(), d.getMonth(), 1)); }} className="rounded-md border border-slate-700 px-2 py-1.5 text-[11px] text-slate-400 transition hover:bg-slate-800">Today</button>
              <button onClick={() => setCursor(new Date(y, m + 1, 1))} className="rounded-md border border-slate-700 p-1.5 text-slate-400 transition hover:bg-slate-800"><ChevronRight className="h-4 w-4" /></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1">
            {WEEKDAYS.map((w) => <div key={w} className="px-1 py-1 text-center text-[10px] uppercase tracking-wider text-slate-500 font-display">{w}</div>)}
            {cells.map((d, i) => {
              if (d === null) return <div key={"e" + i} className="min-h-[84px] rounded-lg" />;
              const dp = postsByDay(d); const isToday = dayISO(d) === todayISO;
              return (
                <div key={d} onClick={() => newPost(dayISO(d))} className={`min-h-[84px] cursor-pointer rounded-lg border p-1 transition hover:border-cyan-500/40 ${isToday ? "border-cyan-500/40 bg-cyan-500/5" : "border-slate-800 bg-slate-950/40"}`}>
                  <div className={`px-1 text-[11px] font-data ${isToday ? "text-cyan-300" : "text-slate-500"}`}>{d}</div>
                  <div className="mt-0.5 space-y-0.5">
                    {dp.slice(0, 3).map((p) => <PostChip key={p.id} post={p} onClick={(e) => { e.stopPropagation(); setEditing(p); }} />)}
                    {dp.length > 3 && <p className="px-1 text-[10px] text-slate-500">+{dp.length - 3} more</p>}
                  </div>
                </div>
              );
            })}
          </div>
        </Panel>
      ) : (
        <div className="space-y-2">
          {sortedList.length === 0 && <Panel className="p-6 text-center text-sm text-slate-500">No posts yet — create one, or generate with AI.</Panel>}
          {sortedList.map((p) => (
            <Panel key={p.id} className="p-3">
              <button onClick={() => setEditing(p)} className="flex w-full items-center gap-3 text-left">
                {p.photo ? <img src={p.photo} alt="" className="h-12 w-12 shrink-0 rounded-lg object-cover" /> : <div className="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg border border-slate-800 bg-slate-950 text-slate-600"><ImagePlus className="h-4 w-4" /></div>}
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-1.5">{p.channels.map((c) => <SrcChip key={c} source={c} />)}<Chip status={POST_STATUS[p.status].c}>{POST_STATUS[p.status].label}</Chip></div>
                  <p className="mt-1 truncate text-sm text-slate-200">{p.caption || "Untitled"}</p>
                </div>
                <div className="shrink-0 text-right">
                  <p className="font-data text-[11px] text-slate-400">{fmtWhen(p.scheduledAt)}</p>
                  {p.status === "posted" && (p.reach || p.engagement) ? <p className="font-data text-[11px] text-emerald-300">{p.reach || 0} reach · {p.engagement || 0} eng</p> : null}
                </div>
              </button>
            </Panel>
          ))}
        </div>
      )}

      <div className="flex items-start gap-2 rounded-xl border border-slate-800 bg-slate-900/40 p-3 text-[11px] text-slate-500"><PlugZap className="mt-0.5 h-3.5 w-3.5 shrink-0 text-cyan-400" />Phase 1 (now): plan, draft and schedule, then copy the caption and post manually. Phase 2 (later): connect the Meta Graph API (Instagram Business + Facebook Page) to auto-publish on schedule and auto-pull performance — requires Meta permissions and App Review.</div>

      {editing && <PostEditor post={editing} onSave={savePost} onDelete={delPost} onClose={() => setEditing(null)} />}
      {aiOpen && <AiStudio leads={leads} onClose={() => setAiOpen(false)} onSaveDraft={(p) => { savePost(p); setAiOpen(false); }} />}
      {ideasOpen && <IdeaStarters leads={leads} onClose={() => setIdeasOpen(false)} onUseIdea={useIdea} />}
    </div>
  );
}

const today = () => new Date().toISOString().slice(0, 10);

// Adaptive storage: window.storage when running inside Claude (durable, cross-device),
// otherwise localStorage when opened as a downloaded file. Same calling shape either way.
const RUNTIME = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function") ? "claude" : "local";
const store = {
  async get(key, fallback) {
    try {
      if (RUNTIME === "claude") { const r = await window.storage.get(key); return r && r.value != null ? JSON.parse(r.value) : fallback; }
      const r = localStorage.getItem(key); return r != null ? JSON.parse(r) : fallback;
    } catch { return fallback; }
  },
  async set(key, value) {
    try {
      const s = JSON.stringify(value);
      if (RUNTIME === "claude") { await window.storage.set(key, s); } else { localStorage.setItem(key, s); }
    } catch {}
  },
};

function MarketingCommandCentre() {
  const [view, setView] = useState("leads");
  const [navOpen, setNavOpen] = useState(false);
  const [leads, setLeads] = useState(SEED_LEADS);
  const [selId, setSelId] = useState(null);
  const [editor, setEditor] = useState(null); // { leadId, quote }
  const [addOpen, setAddOpen] = useState(false);
  const [aiDismissed, setAiDismissed] = useState(false);
  const [done, setDone] = useState(new Set());
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [metrics, setMetrics] = useState(DEFAULT_METRICS);
  const [posts, setPosts] = useState(SEED_POSTS);
  const [ads, setAds] = useState([]);
  const [hydrated, setHydrated] = useState(false);

  useEffect(() => {
    let alive = true;
    (async () => {
      const [L, S, M, P, A] = await Promise.all([
        store.get(LEADS_KEY, SEED_LEADS), store.get(SETTINGS_KEY, DEFAULT_SETTINGS),
        store.get(METRICS_KEY, DEFAULT_METRICS), store.get(POSTS_KEY, SEED_POSTS), store.get(ADS_KEY, []),
      ]);
      if (!alive) return;
      setLeads(Array.isArray(L) ? L : SEED_LEADS);
      setSettings({ ...DEFAULT_SETTINGS, ...(S || {}) });
      setMetrics({ spend: { ...DEFAULT_METRICS.spend, ...((M && M.spend) || {}) }, organic: { ...DEFAULT_METRICS.organic, ...((M && M.organic) || {}) } });
      setPosts(Array.isArray(P) ? P : []);
      setAds(Array.isArray(A) ? A : []);
      setHydrated(true);
    })();
    return () => { alive = false; };
  }, []);
  useEffect(() => { if (hydrated) store.set(LEADS_KEY, leads); }, [leads, hydrated]);
  useEffect(() => { if (hydrated) store.set(SETTINGS_KEY, settings); }, [settings, hydrated]);
  useEffect(() => { if (hydrated) store.set(METRICS_KEY, metrics); }, [metrics, hydrated]);
  useEffect(() => { if (hydrated) store.set(POSTS_KEY, posts); }, [posts, hydrated]);
  useEffect(() => { if (hydrated) store.set(ADS_KEY, ads); }, [ads, hydrated]);
  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap";
    document.head.appendChild(link);
    // When running as a native Claude React artifact, the runtime ships only core
    // Tailwind classes; load the Play CDN so the arbitrary-value classes also work.
    // Guarded so the downloadable HTML build (which already loads Tailwind) skips it.
    if (typeof window !== "undefined" && !window.tailwind && !document.getElementById("tw-play")) {
      const tw = document.createElement("script");
      tw.id = "tw-play";
      tw.src = "https://cdn.tailwindcss.com";
      document.head.appendChild(tw);
    }
    return () => { if (link.parentNode) link.parentNode.removeChild(link); };
  }, []);

  const sel = leads.find((l) => l.id === selId) || null;
  const patch = (id, fn) => setLeads((prev) => prev.map((l) => (l.id === id ? fn(l) : l)));

  const actions = {
    qualify: (id) => patch(id, (l) => ({ ...l, stage: "qualified" })),
    newQuote: (id) => setEditor({ leadId: id, quote: { id: uid(), status: "draft", createdAt: new Date().toISOString().slice(0, 10), lineItems: [] } }),
    editQuote: (id, qid) => { const l = leads.find((x) => x.id === id); const q = l.quotes.find((x) => x.id === qid); setEditor({ leadId: id, quote: q }); },
    saveQuote: (leadId, quote) => {
      patch(leadId, (l) => {
        const exists = l.quotes.some((q) => q.id === quote.id);
        const quotes = exists ? l.quotes.map((q) => (q.id === quote.id ? quote : q)) : [...l.quotes, quote];
        const stage = l.stage === "qualified" || l.stage === "new" ? "quote" : l.stage;
        return { ...l, quotes, stage };
      });
      setEditor(null);
    },
    markWon: (id, qid) => patch(id, (l) => ({ ...l, stage: "won", wonQuoteId: qid, lostReason: null, jobStatus: l.jobStatus || "scheduled", durationWeeks: l.durationWeeks || 2, startDate: l.startDate || firstOfNextMonth() })),
    scheduleJob: (id, p) => patch(id, (l) => ({ ...l, ...p })),
    markLost: (id, reason) => patch(id, (l) => ({ ...l, stage: "lost", lostReason: reason })),
    reopen: (id) => patch(id, (l) => ({ ...l, stage: l.quotes.length ? "quote" : "qualified", wonQuoteId: null, lostReason: null })),
    setTradify: (id, v) => patch(id, (l) => ({ ...l, tradify: v })),
    setSource: (id, src) => patch(id, (l) => ({ ...l, source: src })),
  };
  const addLead = (f) => { const id = "n" + uid(); setLeads((p) => [{ id, date: new Date().toISOString().slice(0, 10), name: f.name.trim(), suburb: f.suburb.trim() || "—", source: f.source, project: f.project.trim() || "Bathroom", stage: "new", quotes: [] }, ...p]); setAddOpen(false); setSelId(id); };
  const resetBoard = () => { if (typeof window !== "undefined" && window.confirm("Reset the board to your tracker data? This clears any changes.")) { setLeads(SEED_LEADS); setSelId(null); } };
  const toggleDone = (id) => setDone((p) => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const go = (id) => { setView(id); setNavOpen(false); };

  const renderView = () => {
    switch (view) {
      case "leads":      return <LeadsBoard leads={leads} onCard={setSelId} onAdd={() => setAddOpen(true)} openActions={() => go("actions")} aiDismissed={aiDismissed} setAiDismissed={setAiDismissed} onReset={resetBoard} />;
      case "pipeline":   return <PipelineView leads={leads} settings={settings} setSettings={setSettings} onCard={setSelId} onSchedule={actions.scheduleJob} />;
      case "revenue":    return <RevenueView leads={leads} />;
      case "funnel":     return <FunnelView />;
      case "compare":    return <PaidVsOrganicView leads={leads} metrics={metrics} setMetrics={setMetrics} />;
      case "google":     return <GoogleView />;
      case "meta":       return <MetaView />;
      case "content":    return <ContentView />;
      case "calendar":   return <CalendarView posts={posts} setPosts={setPosts} leads={leads} />;
      case "ads":        return <AdsView ads={ads} setAds={setAds} leads={leads} />;
      case "seo":        return <ConnectPrompt icon={TrendingUp} title="Connect your SEO data" body="No rank tracker or Search Console is linked yet, so rankings and organic traffic aren’t shown. Your suburbs are clear from won/quoted jobs — see the Action Centre for the pages worth building." items={["Google Search Console", "A rank tracker (e.g. for ‘bathroom renovations gold coast’ and suburb terms)"]} />;
      case "reviews":    return <ConnectPrompt icon={Star} title="Connect your Google Business Profile" body="Your own reviews, rating, calls and direction requests aren’t linked yet. The competitor field is in the Competitors tab — top rival sits at 107 reviews / 5.0, so a review-velocity target matters." items={["Google Business Profile (reviews, calls, clicks, directions)"]} />;
      case "competitor": return <CompetitorView />;
      case "actions":    return <ActionsView done={done} toggle={toggleDone} />;
      case "assistants": return <AssistantsView />;
      default:           return null;
    }
  };

  return (
    <div className="font-body min-h-screen bg-slate-950 text-slate-200">
      <style>{`
        :root { color-scheme: dark; }
        .font-display { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
        .font-body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-data { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 8px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *:focus-visible { outline: 2px solid #22d3ee; outline-offset: 2px; border-radius: 6px; }
        input[type=number]::-webkit-inner-spin-button { opacity: .35; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
      `}</style>

      <div className="flex">
        <aside className={`fixed inset-y-0 left-0 z-40 flex w-64 transform flex-col border-r border-slate-800 bg-slate-900/80 transition-transform lg:static lg:translate-x-0 ${navOpen ? "translate-x-0" : "-translate-x-full"}`}>
          <div className="flex h-16 items-center gap-2.5 border-b border-slate-800 px-5">
            <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-cyan-500 text-slate-950"><Workflow className="h-5 w-5" /></div>
            <div className="leading-tight"><p className="font-display text-sm font-semibold text-slate-100">Plumb Renovations</p><p className="text-[10px] uppercase tracking-wider text-slate-500">Command Centre</p></div>
          </div>
          <nav className="flex-1 overflow-y-auto px-3 py-4">
            {NAV.map((grp) => (
              <div key={grp.group} className="mb-4">
                <p className="px-3 pb-2 text-[10px] uppercase tracking-[0.18em] text-cyan-400/80 font-display">{grp.group}</p>
                <div className="space-y-0.5">{grp.items.map((n) => { const active = view === n.id; return (
                  <button key={n.id} onClick={() => go(n.id)} className={`flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm transition ${active ? "bg-cyan-500/10 text-cyan-300 ring-1 ring-cyan-500/30" : "text-slate-400 hover:bg-slate-800/60 hover:text-slate-200"}`}><n.icon className="h-4 w-4" />{n.label}</button>); })}
                </div>
              </div>
            ))}
          </nav>
        </aside>
        {navOpen && <div onClick={() => setNavOpen(false)} className="fixed inset-0 z-30 bg-slate-950/60 lg:hidden" />}

        <div className="flex min-h-screen flex-1 flex-col">
          <header className="sticky top-0 z-20 flex h-16 items-center justify-between border-b border-slate-800 bg-slate-950/80 px-4 sm:px-6">
            <div className="flex items-center gap-3">
              <button onClick={() => setNavOpen(true)} className="rounded-lg border border-slate-700 p-2 text-slate-400 lg:hidden"><Menu className="h-4 w-4" /></button>
              <div><Eyebrow>{["leads", "pipeline", "revenue"].includes(view) ? "Operations" : "Marketing"}</Eyebrow><h1 className="font-display text-lg font-semibold tracking-tight text-slate-100">{TITLES[view]}</h1></div>
            </div>
            <span className="hidden items-center gap-1.5 text-[11px] text-emerald-400 sm:inline-flex"><span className="h-1.5 w-1.5 rounded-full bg-emerald-400" /> live data</span>
          </header>
          <main className="mx-auto w-full max-w-7xl flex-1 px-4 py-6 sm:px-6 lg:px-8">{renderView()}</main>
        </div>
      </div>

      {sel && <LeadDrawer lead={sel} onClose={() => setSelId(null)} actions={actions} />}
      {editor && <QuoteBuilder editor={editor} leadName={(leads.find((l) => l.id === editor.leadId) || {}).name} onSave={(q) => actions.saveQuote(editor.leadId, q)} onClose={() => setEditor(null)} />}
      {addOpen && <AddLead onSave={addLead} onClose={() => setAddOpen(false)} />}
    </div>
  );
}

import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<MarketingCommandCentre />);
</script>
</body>
</html>
